apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: dev
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'nest-app'
        metrics_path: /metrics
        static_configs:
          - targets: ['nest-service.dev.svc.cluster.local:3000']