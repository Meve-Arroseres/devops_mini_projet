apiVersion: apps/v1
kind: Deployment
metadata:
  name: nest-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nest
  template:
    metadata:
      labels:
        app: nest
    spec:
      containers:
      - name: nest
        image: app/nest-app:V1
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
