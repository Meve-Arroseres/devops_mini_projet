stages:
  - test
  - build
  - deploy

variables:
  IMAGE_NAME: nest-app

test:
  stage: test
  image: node:20-alpine
  script:
    - npm install
    - echo "Running tests..."
    - echo "No tests yet, but stage OK"

build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - echo "Building Docker image..."
    - docker build -t $IMAGE_NAME:v1 .
  only:
    - main

deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - echo "Deploying to Kubernetes..."
    - kubectl apply -f k8s/
  only:
    - main